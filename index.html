<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Midi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-img" id="bg"></div>
    <div class="noise-overlay"></div>

    <!-- Category Chips -->
    <div class="chip-wrapper">
        <div class="chip-container">
            <button class="chip active" data-img="bgmg/pokemon-bg.jpg"
                data-sounds="sounds/pokemon/1.wav,sounds/pokemon/2.wav,sounds/pokemon/3.wav,sounds/pokemon/4.wav,sounds/pokemon/5.wav,sounds/pokemon/6.wav,sounds/pokemon/7.wav,sounds/pokemon/8.wav,sounds/pokemon/9.wav">Pokemon</button>
            <button class="chip" data-img="bgmg/jujutsu-kaisen-bg.jpg"
                data-sounds="sounds/jjk/1.mp3,sounds/jjk/2.mp3,sounds/jjk/3.mp3,sounds/jjk/4.mp3,sounds/jjk/5.mp3,sounds/jjk/6.mp3,sounds/jjk/7.mp3,sounds/jjk/8.mp3,sounds/jjk/9.mp3">Jujutsu
                Kaisen</button>
            <button class="chip" data-img="bgmg/demon-slayer-bg.png"
                data-sounds="sounds/demonslayer/1.mp3,sounds/demonslayer/2.mp3,sounds/demonslayer/3.mp3,sounds/demonslayer/4.mp3,sounds/demonslayer/5.mp3,sounds/demonslayer/6.mp3,sounds/demonslayer/7.mp3,sounds/demonslayer/8.mp3,sounds/demonslayer/9.mp3">Demon
                Slayer</button>
            <button class="chip" data-img="bgmg/death-note-bg.jpg"
                data-sounds="sounds/deathnote/slice1.mp3,sounds/deathnote/slice2.mp3,sounds/deathnote/slice3.mp3,sounds/deathnote/slice4.mp3,sounds/deathnote/slice5.mp3,sounds/deathnote/slice6.mp3,sounds/deathnote/kick1.mp3,sounds/deathnote/snare1.mp3,sounds/deathnote/hihat1.mp3">Death
                Note</button>
            <button class="chip" data-img="bgmg/one-piece-bg.jpg"
                data-sounds="sounds/onepiece/1.mp3,sounds/onepiece/2.mp3,sounds/onepiece/3.mp3,sounds/onepiece/4.mp3,sounds/onepiece/5.mp3,sounds/onepiece/6.mp3,sounds/onepiece/7.mp3,sounds/onepiece/8.mp3,sounds/onepiece/9.mp3">One
                Piece</button>
            <button class="chip" data-img="bgmg/weeknd-bg.jpg"
                data-sounds="sounds/weeknd/1.mp3,sounds/weeknd/2.mp3,sounds/weeknd/3.mp3,sounds/weeknd/4.mp3,sounds/weeknd/5.mp3,sounds/weeknd/6.mp3,sounds/weeknd/7.mp3,sounds/weeknd/8.mp3,sounds/weeknd/9.mp3">The
                Weeknd</button>
        </div>
    </div>


    <!-- Pad Grid -->
    <main class="pad-container">
        <div class="pad" data-key="Q">
            <div class="pad-ripple"></div>
            <div class="pad-glow"></div>
        </div>
        <div class="pad" data-key="W">
            <div class="pad-ripple"></div>
            <div class="pad-glow"></div>
        </div>
        <div class="pad" data-key="E">
            <div class="pad-ripple"></div>
            <div class="pad-glow"></div>
        </div>
        <div class="pad" data-key="A">
            <div class="pad-ripple"></div>
            <div class="pad-glow"></div>
        </div>
        <div class="pad" data-key="S">
            <div class="pad-ripple"></div>
            <div class="pad-glow"></div>
        </div>
        <div class="pad" data-key="D">
            <div class="pad-ripple"></div>
            <div class="pad-glow"></div>
        </div>
        <div class="pad" data-key="Z">
            <div class="pad-ripple"></div>
            <div class="pad-glow"></div>
        </div>
        <div class="pad" data-key="X">
            <div class="pad-ripple"></div>
            <div class="pad-glow"></div>
        </div>
        <div class="pad" data-key="C">
            <div class="pad-ripple"></div>
            <div class="pad-glow"></div>
        </div>
    </main>


    <!-- Recording FAB -->
    <div class="rec-fab-wrap">
        <!-- Expanded tray (play + clear + timer) -->
        <div class="rec-tray" id="recTray">
            <button class="tray-btn" id="clearBtn" title="Clear" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" width="14" height="14">
                    <polyline points="3,6 5,6 21,6" />
                    <path d="M19,6l-1,14H6L5,6" />
                    <path d="M10,11v6M14,11v6" />
                </svg>
            </button>
            <div class="rec-timer" id="recTimer">0:00</div>
            <button class="tray-btn tray-play" id="playBtn" title="Play" disabled>
                <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14" id="playIcon">
                    <polygon points="6,4 20,12 6,20" />
                </svg>
            </button>
        </div>

        <!-- Main record circle -->
        <button class="rec-circle" id="recBtn" title="Record">
            <span class="rec-circle-dot"></span>
        </button>
    </div>

    <script src="script.js"></script>
</body>

</html>
